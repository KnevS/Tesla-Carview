version: '3.9'

services:
  # Resource-Limits sind bewusst konservativ:
  #   - Host hat aktuell 1 CPU / 2 GB RAM / 0 Swap (siehe ops-docs)
  #   - Backend laeuft im Idle bei ~40 MB RSS, peakt waehrend Migration
  #     / Backup-Erzeugung auf 100-200 MB. 384 MB Cap gibt Headroom,
  #     aber verhindert Runaway-Eskalation (z.B. durch schlecht
  #     getypte Trip-Export-Querys auf grossen Datenmengen).
  #   - Nginx + Frontend halten quasi nichts, 64 MB reichen mit Luft.
  #   - cpus '0.75' fuer Backend laesst der CLI / SSH-Session genug
  #     Headroom, falls der Poller eine Schleife dreht.
  backend:
    # Pull bevorzugt aus GHCR; wenn das Image dort nicht verfügbar ist
    # (z.B. Visibility=privat bei Fremd-Installationen), baut Docker
    # automatisch lokal aus ./backend. So bleibt setup.sh robust ohne
    # zusätzliche Authentication.
    image: ghcr.io/knevs/tesla-carview/backend:main
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tesla-carview-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Default-URL fuer den im Stack gebundelten Ollama-Service.
      # Wird vom Admin im Wizard ueberschrieben wenn externer Ollama
      # verwendet werden soll (tenant_setting ai.ollama_url hat Vorrang).
      OLLAMA_URL: "http://ollama:11434"
    volumes:
      - tesla_data:/app/data
      # system.js: enthaelt /container-restart Endpoint + generateVAPIDKeys-Fix.
      # Volume-Mount sichert diese Aenderungen gegen Image-Updates ab.
      - ./backend/src/routes/system.js:/app/src/routes/system.js:ro
      # Demo-Feature wurde aus der Hauptinstanz entfernt (2026-05-26).
      # Die Demo laeuft als eigenstaendiger Stack unter /opt/tesla-carview-demo
      # und ist per https://demo.teslaview.krische.com erreichbar.
    networks:
      - tesla-net
    depends_on:
      - tesla-proxy
    deploy:
      resources:
        limits:
          memory: 512M   # erhöht von 384M: Demo-Mandant mit 52 Fahrzeugen braucht mehr Headroom
          cpus: '0.75'
        reservations:
          memory: 96M
    mem_swappiness: 10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    # Pull bevorzugt aus GHCR; fallback auf lokalen Build (siehe backend).
    image: ghcr.io/knevs/tesla-carview/frontend:main
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tesla-carview-frontend
    restart: unless-stopped
    # Das Frontend-Bundle kommt direkt aus dem GHCR-Image (Stub-Demo.vue).
    # KEIN Volume-Mount auf /usr/share/nginx/html: das Verzeichnis
    # frontend-dist-private/ ist gitignored und existiert bei Frisch-
    # Installationen nicht → der Bind-Mount legte ein LEERES Verzeichnis an,
    # ueberdeckte das Image-Bundle und nginx lieferte 403 Forbidden (#84).
    # Server-spezifische Overrides (z.B. das private Demo-Bundle der separaten
    # Demo-Instanz) gehoeren in die gitignorete docker-compose.override.yml.
    networks:
      - tesla-net
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  nginx:
    image: nginx:alpine
    container_name: tesla-carview-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./deploy/nginx-internal.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tesla-net
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  # tesla-http-proxy: Tesla Signed-Command Proxy.
  # Laeuft im tesla-net mit dem Network-Alias 'host.docker.internal',
  # damit der Backend-Code (PROXY_BASE = https://host.docker.internal:4443)
  # ohne Aenderung weiterfunktioniert. Kein Host-Port-Mapping noetig —
  # nur der Backend-Container muss ihn erreichen koennen.
  # Benoetigt User 988 (tesla-proxy auf dem Host) fuer Lese-Zugriff auf Keys.
  # Ollama — lokaler LLM-Runtime für den datensouveraenen KI-Chat.
  # Default aktiv; Memory- und CPU-Limits konservativ (passt auf VPS ab
  # ~4 GB RAM; auf 2-GB-Hosts wird ein 1B-Modell mit OLLAMA_MEMORY_LIMIT=1500M
  # gerade noch laufen, oder den Service mit
  #   COMPOSE_PROFILES=lite docker compose up
  # komplett deaktivieren). Volumen: Modelle werden persistent in
  # `ollama_models` gespeichert (1-20 GB je nach gepulltem Modell).
  # Sicherheit: KEIN Host-Port-Mapping — nur Backend ueber tesla-net.
  ollama:
    image: ollama/ollama:latest
    container_name: tesla-carview-ollama
    restart: unless-stopped
    # Default-ON: kein `profiles:`-Key, Service laeuft immer.
    # Auf 2-GB-Hosts deaktivieren: docker-compose.override.yml anlegen mit
    #   services:
    #     ollama:
    #       profiles: [disabled]
    # Dann startet Ollama nur noch mit `COMPOSE_PROFILES=disabled` — also nie.
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - tesla-net
    environment:
      # Hoert auf allen Interfaces, aber tesla-net ist intern — nicht extern.
      OLLAMA_HOST: "0.0.0.0:11434"
      # Modelle nach 5 Min Idle entladen (RAM freigeben auf kleinen Hosts).
      OLLAMA_KEEP_ALIVE: "5m"
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-2048M}
          cpus: ${OLLAMA_CPU_LIMIT:-1.5}
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  tesla-proxy:
    image: tesla/vehicle-command:latest
    container_name: tesla-carview-proxy
    restart: unless-stopped
    user: "988:988"
    command:
      - -port
      - "4443"
      - -host
      - "0.0.0.0"
      - -tls-key
      - /config/server.key
      - -cert
      - /config/server.crt
      - -key-file
      - /config/tesla_priv.pem
    volumes:
      - /etc/tesla-proxy:/config:ro
    networks:
      tesla-net:
        aliases:
          - host.docker.internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

volumes:
  tesla_data:
  ollama_models:    # ~1-20 GB je nach gepulltem Modell

networks:
  tesla-net:
    driver: bridge
