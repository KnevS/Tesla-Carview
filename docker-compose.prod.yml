version: '3.9'

services:
  # Resource-Limits sind bewusst konservativ:
  #   - Host hat aktuell 1 CPU / 2 GB RAM / 0 Swap (siehe ops-docs)
  #   - Backend laeuft im Idle bei ~40 MB RSS, peakt waehrend Migration
  #     / Backup-Erzeugung auf 100-200 MB. 384 MB Cap gibt Headroom,
  #     aber verhindert Runaway-Eskalation (z.B. durch schlecht
  #     getypte Trip-Export-Querys auf grossen Datenmengen).
  #   - Nginx + Frontend halten quasi nichts, 64 MB reichen mit Luft.
  #   - cpus '0.75' fuer Backend laesst der CLI / SSH-Session genug
  #     Headroom, falls der Poller eine Schleife dreht.
  backend:
    image: ghcr.io/knevs/tesla-carview/backend:main
    container_name: tesla-carview-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - tesla_data:/app/data
      # system.js: enthaelt /container-restart Endpoint + generateVAPIDKeys-Fix.
      # Volume-Mount sichert diese Aenderungen gegen Image-Updates ab.
      - ./backend/src/routes/system.js:/app/src/routes/system.js:ro
      # Demo-Feature wurde aus der Hauptinstanz entfernt (2026-05-26).
      # Die Demo laeuft als eigenstaendiger Stack unter /opt/tesla-carview-demo
      # und ist per https://demo.teslaview.krische.com erreichbar.
    networks:
      - tesla-net
    depends_on:
      - tesla-proxy
    deploy:
      resources:
        limits:
          memory: 512M   # erhöht von 384M: Demo-Mandant mit 52 Fahrzeugen braucht mehr Headroom
          cpus: '0.75'
        reservations:
          memory: 96M
    mem_swappiness: 10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/knevs/tesla-carview/frontend:main
    container_name: tesla-carview-frontend
    restart: unless-stopped
    volumes:
      # Kein privates Frontend-Bundle mehr fuer die Hauptinstanz (Demo entfernt 2026-05-26).
      # Das oeffentliche Bundle aus dem GHCR-Image wird verwendet (Stub-Demo.vue).
      # Das vollstaendige Demo-Bundle liegt nur in der Demo-Instanz (/opt/tesla-carview-demo).
      - ./frontend-dist-private:/usr/share/nginx/html:ro
    networks:
      - tesla-net
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  nginx:
    image: nginx:alpine
    container_name: tesla-carview-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./deploy/nginx-internal.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tesla-net
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  # tesla-http-proxy: Tesla Signed-Command Proxy.
  # Laeuft im tesla-net mit dem Network-Alias 'host.docker.internal',
  # damit der Backend-Code (PROXY_BASE = https://host.docker.internal:4443)
  # ohne Aenderung weiterfunktioniert. Kein Host-Port-Mapping noetig —
  # nur der Backend-Container muss ihn erreichen koennen.
  # Benoetigt User 988 (tesla-proxy auf dem Host) fuer Lese-Zugriff auf Keys.
  tesla-proxy:
    image: tesla/vehicle-command:latest
    container_name: tesla-carview-proxy
    restart: unless-stopped
    user: "988:988"
    command:
      - -port
      - "4443"
      - -host
      - "0.0.0.0"
      - -tls-key
      - /config/server.key
      - -cert
      - /config/server.crt
      - -key-file
      - /config/tesla_priv.pem
    volumes:
      - /etc/tesla-proxy:/config:ro
    networks:
      tesla-net:
        aliases:
          - host.docker.internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

volumes:
  tesla_data:

networks:
  tesla-net:
    driver: bridge
