version: '3.9'

services:
  backend:
    build: ./backend
    container_name: tesla-carview-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data

  frontend:
    build: ./frontend
    container_name: tesla-carview-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  data:
