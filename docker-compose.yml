version: '3.9'

services:
  backend:
    build: ./backend
    container_name: tesla-carview-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data

  frontend:
    build: ./frontend
    container_name: tesla-carview-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: tesla-carview-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./deploy/nginx-internal.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  data:
