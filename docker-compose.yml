version: '3.9'

services:
  backend:
    build: ./backend
    container_name: tesla-carview-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m
    memswap_limit: 512m

  frontend:
    build: ./frontend
    container_name: tesla-carview-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    mem_limit: 64m
    memswap_limit: 64m

  nginx:
    image: nginx:alpine
    container_name: tesla-carview-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./deploy/nginx-internal.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    mem_limit: 64m
    memswap_limit: 64m

volumes:
  data:
