name: Commit Message

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Lint commit messages
        run: |
          TYPES="feat|fix|chore|ci|docs|refactor|test|perf|style|build|revert"
          ERRORS=0
          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            [[ "$msg" =~ ^Merge ]] && continue
            [[ "$msg" =~ ^Revert ]] && continue
            if ! echo "$msg" | grep -qE "^($TYPES)(\([a-z0-9/._-]+\))?: .{3,}"; then
              echo "Ungueltige Commit-Nachricht: $msg"
              echo "  Erwartet: <type>(<scope>): <beschreibung>"
              echo "  Gueltige Types: $TYPES"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $msg"
            fi
          done < <(git log origin/main..HEAD --format="%s")
          [[ $ERRORS -gt 0 ]] && { echo "$ERRORS Commit(s) nicht konform."; exit 1; } || echo "Alle Commits konform."

