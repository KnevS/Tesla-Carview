name: Security

# Zyklische Sicherheits-Pruefungen, die ueber den reinen Secret-Scan
# (gitleaks.yml) und den Syntax-CI (ci.yml) hinausgehen:
#
#  - npm audit fuer Backend + Frontend, fail auf high / critical
#  - trivy fs (Lockfiles + Dockerfile-Basisimages)
#  - semgrep SAST (OWASP-Top-10 + JS/TS + Secrets)
#  - CycloneDX-SBOM als Build-Artefakt (Audit/Forensik)
#  - Wochentliche Vollausfuehrung (Mo 06:00 UTC) selbst ohne Code-
#    Aenderung — neue CVEs koennen jederzeit gegen unveraenderten
#    Code auftauchen.
#
# Ergaenzt das server-seitige /opt/monitoring/bin/security-audit.sh,
# das die gleiche Familie an Checks auf dem Live-Host wochentlich faehrt.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Montag 06:00 UTC — neue CVEs aus dem Wochenende fangen, bevor
    # die Woche losgeht.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # fuer SARIF-Uploads (semgrep)

jobs:
  npm-audit-backend:
    name: npm audit · backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # npm audit braucht nur package-lock.json, kein npm ci — Aufruf
      # ist damit von vornherein script-frei. Wir setzen trotzdem
      # explizit auf --omit=dev fuer den blockierenden Check.
      - name: Audit (production only)
        run: npm audit --omit=dev --audit-level=high

      # Informational: dev-deps NICHT fail-erzwingend, aber im Log
      # sichtbar, damit Drift erkennbar bleibt.
      - name: Audit (incl. dev-deps, informational)
        if: always()
        run: npm audit --audit-level=high || true

  npm-audit-frontend:
    name: npm audit · frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit (production only)
        run: npm audit --omit=dev --audit-level=high

      - name: Audit (incl. dev-deps, informational)
        if: always()
        run: npm audit --audit-level=high || true

  trivy-fs:
    name: trivy · repository filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Trivy scant das Repo nach bekannten Vulns in Lockfiles
      # (package-lock.json, Dockerfile-Basisimages). Schneller und
      # umfassender als npm audit allein.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: 'HIGH,CRITICAL'
          # Lockfiles brauchen ggf. lange — fail nur bei den Severities,
          # die wirklich blocken sollen.
          exit-code: '1'
          ignore-unfixed: true
          # SARIF-Upload sparen wir uns hier (private code, simple repo).

  semgrep:
    name: semgrep · SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v6

      # p/owasp-top-ten + p/javascript + p/typescript decken die
      # haeufigsten Auth/Injection/XSS-Muster ab. p/secrets ergaenzt
      # gitleaks um Patterns aus dem aktuellen Semgrep-Catalog.
      # `semgrep scan --error` failed bei findings blockierend;
      # --metrics=off schickt keine Daten an semgrep.dev.
      - name: semgrep scan
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/secrets \
            --error \
            --metrics=off

  sbom:
    name: SBOM · CycloneDX
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.component }}/package-lock.json

      # --ignore-scripts hier ausreichend: SBOM braucht keinen Native-
      # Build, nur den aufgeloesten Dependency-Graph.
      - name: Install (no postinstall scripts)
        run: npm ci --ignore-scripts

      # CycloneDX-SBOM als Build-Artefakt. Laesst sich gegen den
      # Live-Stand des Repos verifizieren und in Audits referenzieren.
      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --output-file sbom.cdx.json --output-format json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.component }}
          path: ${{ matrix.component }}/sbom.cdx.json
          retention-days: 90
