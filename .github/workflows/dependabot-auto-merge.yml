name: Dependabot Auto-Merge

# Auto-Mergt Dependabot-PRs sobald alle Required-CI-Gates gruen sind —
# fuer Patch- und Minor-Bumps. Major-Bumps werden gelabelt und warten
# auf manuellen Sven-Review (siehe Memory `feedback_supply_chain_ai_security`).
#
# Sicherheitsnetz:
#   - Nur Dependabot-Authored PRs werden hier verarbeitet
#     (`github.actor == 'dependabot[bot]'`).
#   - `gh pr merge --auto` wartet auf alle Required-Checks (ci.yml,
#     security.yml, gitleaks.yml) bevor gemerged wird.
#   - --squash haelt die main-History sauber.
#
# Voraussetzungen in den GitHub-Repo-Settings (einmalig):
#   - Settings -> General -> "Allow auto-merge" aktivieren.
#   - Branch protection auf `main`: required status checks enabled
#     (Backend lint, Frontend build, npm audit, trivy, gitleaks, SBOM),
#     aber KEINE required reviews fuer dependabot[bot] — sonst kann
#     der bot nicht durch.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  # Bei jedem Push auf main alle offenen Dependabot-PRs nachziehen
  # (Auto-Rebase): mit Required-Check „branches up to date" blieben
  # Bot-PRs sonst dauerhaft BEHIND haengen, sobald main sich bewegt —
  # der aktivierte Auto-Merge kam nie zum Zug. Muster aus indasys-fleet
  # (dependabot-automerge.yml, dort seit v1.181.0 produktiv).
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  auto-merge:
    name: auto-merge non-major
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]'
    # Dieser Job hat bewusst KEINEN actions/checkout-Schritt. Ohne Working Tree
    # faellt `gh` auf `git remote get-url origin` zurueck, um owner/repo zu
    # ermitteln — was mit "fatal: not a git repository" scheitert. Befehle mit
    # einer vollen PR-URL (gh pr merge "$PR_URL") leiten das Repo aus der URL ab,
    # aber `gh label create` hat keine URL und braucht daher GH_REPO explizit.
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (patch + minor)
        # Major-Bumps NICHT auto-mergen — sie koennen breaking changes
        # mitbringen, die CI-gruen aber Runtime-broken sind.
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major bumps
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh label create "major-bump" --color "d93f0b" --description "Major version bump – needs manual review" --force
          gh label create "needs-review" --color "e4e669" --description "Needs review before merge" --force
          gh pr edit "$PR_URL" --add-label "major-bump" --add-label "needs-review"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-dependabot-branches:
    name: keep dependabot PRs up to date
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Offene Dependabot-PRs per update-branch aktualisieren
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          PRS=$(gh pr list --repo "$REPO" --author "app/dependabot" --state open --json number --jq '.[].number')
          if [ -z "$PRS" ]; then
            echo "Keine offenen Dependabot-PRs."
            exit 0
          fi
          for PR in $PRS; do
            echo "::group::PR #$PR"
            # Fehler tolerieren: „already up to date", Merge-Konflikte etc.
            gh pr update-branch "$PR" --repo "$REPO" \
              || echo "::warning::PR #$PR konnte nicht aktualisiert werden (evtl. bereits aktuell oder Konflikt)"
            echo "::endgroup::"
          done
