name: Docker Build Gate

# Baut die Images WAEHREND des PRs und scannt das fertige Laufzeit-Image.
# Schliesst die Luecke, die Base-Image-Updates zum Blindflug gemacht hat:
# deploy.yml laeuft erst nach erfolgreichem CI auf main — ein PR, der ein
# Base-Image tauscht, wurde also nie gebaut, bevor er gemergt war.
#
# Der zweite Job ist hier der eigentliche Schutz. Beide Images sind
# Multi-Arch (amd64 · arm64 fuer Pi 4/5), und ein Base-Image-Wechsel kann
# auf amd64 anstandslos durchbauen und trotzdem auf arm brechen — durch
# fehlende native Bindings (rolldown im Frontend) oder nicht kompilierende
# Module (better-sqlite3, argon2 im Backend). Ohne Multi-Arch-Build im PR
# faellt das erst denen auf, die auf einem Pi selbst bauen.
#
# linux/arm/v7 (Pi 3) ist bewusst nicht mehr dabei: Node veroeffentlicht ab
# Major 24 keine arm/v7-Images, weder alpine noch Debian. Der Pi-3-Support
# ist mit dem Wechsel auf node:26 faktisch entfallen — dieser Workflow hat
# das sichtbar gemacht, nicht verursacht.
#
# Warum trivy hier auf dem IMAGE laeuft und nicht wie in security.yml auf
# dem Dateisystem: Multi-Stage-Builds trennen Build- und Laufzeit scharf.
# Die Builder-Stage des Frontends meldet CVEs, die nie laufen — ins
# nginx:alpine-Image wandert nur /app/dist. Ein Gate, das Builder-CVEs
# zaehlt, erzeugt Druck auf Aenderungen ohne jeden Sicherheitsgewinn.
#
# Zusaetzlich laeuft der trivy-Secret-Scanner auf dem Image. Das deckt eine
# Luecke, die gitleaks.yml prinzipbedingt nicht sieht: gitleaks prueft Repo
# und History, aber nicht, was der Build ins Image KOPIERT. Ein `COPY . .`
# mit unvollstaendiger .dockerignore zieht .env oder Tokens in einen Layer —
# im Repo ist dann nichts zu finden, im veroeffentlichten Image schon.
#
# Bewertungsmassstab (bewusst eng, damit das Gate nicht zum Rauschen wird):
#   - Build schlaegt fehl (auf irgendeiner Plattform) → rot. Kernzweck.
#   - Secret im Image gefunden                        → rot. Ausnahmslos.
#   - CRITICAL mit verfuegbarem Fix im Runtime-Image  → rot.
#   - HIGH / ohne Fix (will_not_fix, fix_deferred)    → nur Report.
#
# Ventil: Es gibt CRITICALs, die trivy als "fixed" fuehrt, die hier aber
# trotzdem niemand beheben kann. CVE-2026-59873 (tar) war so ein Fall —
# der Fix liegt in 7.5.19, aber kein node-Image liefert ihn aus. Hier gab
# es noch einen Ausweg (npm aus dem Laufzeit-Image werfen). Fehlt der beim
# naechsten Mal, blockiert dieses Gate JEDEN PR. Dokumentierter Weg dann:
# `.trivyignore` im Repo-Root, das trivy automatisch beruecksichtigt —
#
#     # kein Base-Image liefert den Fix; Stand 2026-07, Lage neu pruefen
#     CVE-2026-XXXXX exp:2026-10-01
#
# Das Ablaufdatum ist der Punkt: Danach blockiert der Fund wieder, statt
# still zu verschwinden. Eintraege ohne `exp:` gehoeren hier nicht hin.

# Bewusst OHNE paths-Filter auf Trigger-Ebene: `build-and-scan` ist ein
# Required Check der Branch-Protection. Ein Workflow, der wegen paths gar
# nicht startet, meldet seinen Check nie — GitHub wartet dann ewig auf
# "Expected" und jeder PR ohne Dockerfile-Aenderung waere unmergebar.
# Der teure Multi-Arch-Job wird stattdessen ueber den `changes`-Job
# gesteuert, siehe unten.
on:
  pull_request:
  schedule:
    # Faengt Base-Images, die ohne Tag-Wechsel neue CVEs bekommen haben
    # (gleicher Tag, neuer Digest) — dafuer gibt es keinen Dependabot-PR.
    - cron: '23 7 * * 1'
  workflow_dispatch:

# Minimal: der Workflow liest nur den Code. Kein Registry-Push (push: false),
# keine PR-Kommentare, keine Issues — Ergebnis steht im Check-Status und im
# Step-Summary. Damit gibt es hier nichts, was ein Fork-PR missbrauchen
# koennte, und der Workflow braucht kein einziges Secret.
permissions:
  contents: read

concurrency:
  group: docker-build-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Ermittelt, ob dieser PR ueberhaupt etwas veraendert, das den
  # Multi-Arch-Build betrifft. Ersetzt den frueheren paths-Filter, der
  # als Required Check nicht funktioniert (siehe Kommentar bei `on:`).
  changes:
    name: relevante Aenderungen?
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.detect.outputs.docker }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: detect
        # SHAs kommen ueber env in die Shell, nicht per Expression-Inlining
        # in die Kommandozeile — Werte aus dem Event gehoeren nie direkt
        # in ein run-Skript.
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT" != "pull_request" ]; then
            # schedule/dispatch: immer vollstaendig pruefen
            echo "docker=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" "$HEAD" \
             | grep -qE '(Dockerfile|package-lock\.json)$'; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-scan:
    name: build + trivy · ${{ matrix.component }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # push: false + load: true — das Image bleibt im Runner und ist fuer
      # trivy als lokales Image adressierbar. Kein Registry-Zugriff noetig.
      # cache-to nur fuer PRs aus diesem Repo: Fork-PRs haben ein read-only
      # GITHUB_TOKEN und koennten den GHA-Cache ohnehin nicht schreiben.
      - name: Build image (amd64, echter Build)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.component }}
          push: false
          load: true
          platforms: linux/amd64
          tags: tcv-gate/${{ matrix.component }}:pr
          cache-from: type=gha,scope=gate-${{ matrix.component }}
          cache-to: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && format('type=gha,scope=gate-{0},mode=max', matrix.component) || '' }}

      - name: Trivy scan des fertigen Laufzeit-Images (CVEs + Secrets)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: tcv-gate/${{ matrix.component }}:pr
          scanners: 'vuln,secret'
          format: json
          output: trivy-image.json
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '0'   # Bewertung differenziert im naechsten Step

      - name: Auswertung + Step-Summary
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          set -euo pipefail
          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-image.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")]     | length' trivy-image.json)
          SECRETS=$(jq '[.Results[]?.Secrets[]?] | length' trivy-image.json)

          {
            echo "## Docker Build Gate · $COMPONENT"
            echo ""
            echo "Build erfolgreich (amd64). Trivy auf dem fertigen Laufzeit-Image, nur behebbare Findings:"
            echo ""
            echo "| Kategorie | Anzahl |"
            echo "|---|---|"
            echo "| Secrets im Image | $SECRETS |"
            echo "| CRITICAL | $CRIT |"
            echo "| HIGH | $HIGH |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            {
              echo ""
              echo "| Paket | CVE | Installiert | Fix | Severity |"
              echo "|---|---|---|---|---|"
              jq -r '
                .Results[]?.Vulnerabilities[]?
                | "| \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "—") | \(.Severity) |"
              ' trivy-image.json | sort -u
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # Secret-Fundstellen NUR mit Pfad/Regel benennen — niemals den
          # Treffer selbst. Dieses Repo ist oeffentlich, jeder kann den Run
          # lesen; ein geleaktes Secret hier nochmal im Klartext zu
          # protokollieren wuerde den Schaden vergroessern.
          if [ "$SECRETS" -gt 0 ]; then
            {
              echo ""
              echo "### Secrets im Image — Build blockiert"
              echo ""
              echo "| Datei | Regel | Severity |"
              echo "|---|---|---|"
              jq -r '
                .Results[]? as $r | $r.Secrets[]?
                | "| \($r.Target) | \(.RuleID) | \(.Severity) |"
              ' trivy-image.json | sort -u
              echo ""
              echo "Wert bewusst nicht ausgegeben. Ursache ist fast immer eine"
              echo "lueckenhafte \`.dockerignore\` — Fundstelle pruefen, Secret"
              echo "rotieren, Datei aus dem Build-Context ausschliessen."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::$COMPONENT: $SECRETS Secret-Fund(e) im Laufzeit-Image — siehe Step-Summary."
          fi

          # Bewusst vollstaendige if-Bloecke: unter `set -e` liefert ein
          # `[ x ] && FAIL=1` bei falscher Bedingung Exit 1 und bricht den
          # Step ab — das Gate waere dann immer rot.
          FAIL=0
          if [ "$SECRETS" -gt 0 ]; then
            FAIL=1
          fi
          if [ "$CRIT" -gt 0 ]; then
            echo "::error::$COMPONENT: $CRIT behebbare CRITICAL-CVE(s) im Laufzeit-Image — Base-Image aktualisieren."
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi

          echo "::notice::$COMPONENT: sauber — keine Secrets, keine behebbaren CRITICAL-CVEs (HIGH: $HIGH)."

  multiarch:
    name: multi-arch build · ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: changes
    # Bewusst KEIN Job-`if`: Ein uebersprungener Job meldet "skipped" statt
    # eines Ergebnisses, und darauf laesst sich kein Required Check
    # verlaesslich stuetzen. Der Job startet deshalb immer und meldet einen
    # echten Status — die teuren Schritte haengen einzeln an `changes`.
    # QEMU-emulierte arm-Builds sind langsam (npm ci + vite build unter
    # Emulation); ohne Dockerfile-/Lockfile-Aenderung faellt der Job
    # dadurch in wenigen Sekunden gruen durch.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.docker == 'true'

      - name: Set up QEMU (arm-Emulation)
        if: needs.changes.outputs.docker == 'true'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        if: needs.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Kein load/push: es geht ausschliesslich darum, ob der Build auf allen
      # unterstuetzten Plattformen durchlaeuft. Genau hier faellt ein
      # Base-Image auf, das auf amd64 gruen ist und auf arm/v7 bricht.
      # linux/arm/v7 (Pi 3) fehlt hier bewusst: Node veroeffentlicht ab
      # Major 24 keine arm/v7-Images mehr, weder alpine noch Debian. Seit
      # dem Wechsel auf node:26 bricht ein arm/v7-Build mit "no match for
      # platform in manifest" ab — der Pi-3-Support ist damit faktisch
      # entfallen, unabhaengig von diesem Workflow. Ihn hier zu fordern
      # wuerde das Gate dauerhaft rot halten, ohne etwas zu reparieren.
      - name: Build fuer alle unterstuetzten Plattformen
        if: needs.changes.outputs.docker == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.component }}
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=gate-multiarch-${{ matrix.component }}
          cache-to: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && format('type=gha,scope=gate-multiarch-{0},mode=max', matrix.component) || '' }}

      - name: Step-Summary
        env:
          COMPONENT: ${{ matrix.component }}
          RAN: ${{ needs.changes.outputs.docker }}
        run: |
          {
            echo "## Multi-Arch Build · $COMPONENT"
            echo ""
            if [ "$RAN" = "true" ]; then
              echo "Gebaut auf \`linux/amd64\` und \`linux/arm64\` (Pi 4/5)."
              echo ""
              echo "\`linux/arm/v7\` (Pi 3) entfaellt: Node liefert ab Major 24 keine arm/v7-Images."
            else
              echo "Uebersprungen — dieser PR aendert weder ein Dockerfile noch ein Lockfile."
              echo ""
              echo "Der Job meldet trotzdem einen Status, damit er als Required Check taugt."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Alarm bei Drift ────────────────────────────────────────────────────
  # Der woechentliche schedule-Lauf faengt Base-Images, die ohne Tag-Wechsel
  # neue CVEs bekommen haben. Ohne diesen Job wuerde ein roter Lauf niemanden
  # erreichen: Es gibt keinen PR, an dem der Check haengt, und ein rotes
  # Cron-Ergebnis liegt still in der Actions-Historie.
  #
  # Der Alarm ist bewusst ein Issue und kein externer Dienst: Er braucht nur
  # das GITHUB_TOKEN, also kein Secret, das dieses Repo verlassen oder in es
  # hineinkopiert werden muesste. EIN Sammel-Issue, das aktualisiert und bei
  # gruenem Lauf automatisch geschlossen wird — keine Issue-Flut.
  #
  # Dieses Repo ist oeffentlich: Das Issue nennt deshalb nur, DASS der Lauf
  # rot ist, nie den Fund selbst. Details stehen im Step-Summary des Laufs.
  #
  # Telegram ist optional zugeschaltet und bleibt inaktiv, solange die
  # Secrets fehlen. Bewusst so: Der Bot-Token liegt auf iland, und ein
  # Secret wird nicht ungefragt zwischen Systemen bewegt. Aktivieren mit
  #   gh secret set TELEGRAM_BOT_TOKEN --repo KnevS/Tesla-Carview
  #   gh secret set TELEGRAM_CHAT_ID   --repo KnevS/Tesla-Carview
  alert:
    name: Alarm bei Drift
    runs-on: ubuntu-latest
    needs: [build-and-scan, multiarch]
    if: always() && github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Sammel-Issue oeffnen/aktualisieren/schliessen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SCAN_RESULT: ${{ needs.build-and-scan.result }}
          ARCH_RESULT: ${{ needs.multiarch.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Docker Build Gate: weekly run failing"

          EXISTING=$(gh issue list --state open --json number,title \
            | jq -r --arg t "$TITLE" '[.[] | select(.title == $t)][0].number // empty')

          if [ "$SCAN_RESULT" = "success" ] && [ "$ARCH_RESULT" = "success" ]; then
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" \
                --comment "Closed automatically: the weekly run is green again ($RUN_URL)."
            fi
            echo "::notice::Drift run green — nothing to report."
            exit 0
          fi

          {
            echo "The weekly Docker Build Gate run is **failing**."
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| build + trivy | \`$SCAN_RESULT\` |"
            echo "| multi-arch build | \`$ARCH_RESULT\` |"
            echo ""
            echo "Run: $RUN_URL"
            echo "Time: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "This run rebuilds the production images and scans them. It"
            echo "fails when an image no longer builds, or when the runtime"
            echo "image contains a secret or a fixable CRITICAL — typically"
            echo "because a base image was republished under the same tag with"
            echo "new content. There is no Dependabot PR for that, hence this"
            echo "alert."
            echo ""
            echo "Findings are deliberately not repeated here (public repo) —"
            echo "open the run's step summary for package, CVE and fix."
            echo ""
            echo "_Maintained by the \`docker-build-gate.yml\` workflow; closed"
            echo "automatically once the weekly run is green again._"
          } > issue-body.md

          gh label create security --color D93F0B \
            --description "Security-relevant findings and fixes" --force || true

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file issue-body.md
            echo "::notice::Collector issue #$EXISTING updated."
          else
            gh issue create --title "$TITLE" --label security --body-file issue-body.md
          fi

      - name: Telegram (only when secrets are set)
        if: needs.build-and-scan.result != 'success' || needs.multiarch.result != 'success'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "::notice::Telegram skipped — TELEGRAM_BOT_TOKEN/CHAT_ID not set."
            exit 0
          fi
          # --data-urlencode: the text must not introduce URL semantics.
          curl -sS --fail-with-body -X POST \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=🔴 ${REPO}: Docker Build Gate (weekly run) is failing. ${RUN_URL}" \
            -o /dev/null
          echo "::notice::Telegram alert sent."
