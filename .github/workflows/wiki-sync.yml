name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - '.github/wiki/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    name: Push wiki pages to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if wiki exists
        id: wiki-check
        run: |
          if git ls-remote \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            HEAD &>/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Wiki repository exists — syncing content."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Wiki not yet initialized."
            echo "   One-time setup: https://github.com/${{ github.repository }}/wiki"
            echo "   Click 'Create the first page', save once, then re-run this workflow."
          fi

      - name: Clone wiki repository
        if: steps.wiki-check.outputs.exists == 'true'
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Copy wiki source files
        if: steps.wiki-check.outputs.exists == 'true'
        run: |
          cp .github/wiki/*.md wiki-repo/

      - name: Inject auto-update timestamp into Home.md
        if: steps.wiki-check.outputs.exists == 'true'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          if grep -q "<!-- wiki-autosync -->" wiki-repo/Home.md; then
            sed -i "s|<!-- wiki-autosync -->.*|<!-- wiki-autosync --> *Auto-synced from [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}) · ${TIMESTAMP}*|" wiki-repo/Home.md
          else
            printf '\n---\n<!-- wiki-autosync --> *Auto-synced from [`%s`](https://github.com/%s/commit/%s) · %s*\n' \
              "$SHORT_SHA" "${{ github.repository }}" "$COMMIT_SHA" "$TIMESTAMP" >> wiki-repo/Home.md
          fi

      - name: Commit and push to wiki
        if: steps.wiki-check.outputs.exists == 'true'
        run: |
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push."
          else
            git commit -m "wiki: auto-sync from ${{ github.repository }}@${{ github.sha }}"
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git push origin "$BRANCH"
          fi
