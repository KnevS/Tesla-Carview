name: Secret-Scan

# Letzte Reissleine gegen Secret/PII-Leaks im Public-Repo. Lokaler
# pre-commit-Hook + GitHub Push-Protection laufen davor — das hier ist
# der Fallback, falls Hook bypassed oder Push-Protection das Pattern
# nicht kennt. Bricht den Build bei Treffer; Output ist redacted, das
# eigentliche Secret erscheint nicht im Action-Log.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Bei Pushes vollständige Historie scannen, bei PRs nur den Diff
          # zur Base — sonst dauert es auf großen Branches unnötig lange.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 50 }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Pfad auf unsere projekt-spezifische Config (VIN-Regex etc.)
          GITLEAKS_CONFIG: .gitleaks.toml
          # --redact: Trefferwerte werden im Log durch ****  ersetzt
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
