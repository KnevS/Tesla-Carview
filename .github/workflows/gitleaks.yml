name: Secret-Scan

# Letzte Reissleine gegen Secret/PII-Leaks im Public-Repo. Lokaler
# pre-commit-Hook + GitHub Push-Protection laufen davor — das hier ist
# der Fallback, falls Hook bypassed oder Push-Protection das Pattern
# nicht kennt. Bricht den Build bei Treffer; --redact unterdrueckt das
# eigentliche Secret im Action-Log.
#
# Hinweis zur Action-Wahl:  gitleaks/gitleaks-action@v2 erzwingt eine
# Lizenz, sobald der Free-Tier-Check der GitHub-API im Rate-Limit
# strandet (passiert auf Public-Repos regelmaessig). Wir rufen das
# offizielle Docker-Image direkt auf — kein License-Gate, gleicher Code.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Volle Historie scannen, damit auch alte Commits gegen die
          # aktuellen Regeln gecheckt werden. Bei Pull-Requests reicht
          # eigentlich der Diff, aber fetch-depth: 0 ist einfacher und
          # kostet auf diesem kleinen Repo <1s.
          fetch-depth: 0

      - name: Run gitleaks (via official image)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            zricethezav/gitleaks:latest \
            detect \
              --source=. \
              --config=.gitleaks.toml \
              --redact \
              --verbose \
              --exit-code=1 \
              --no-banner
