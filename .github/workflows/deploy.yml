name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Secrets (in GitHub Repository Settings → Secrets):
#   DEPLOY_HOST      – IP oder Hostname des Zielservers
#   DEPLOY_USER      – SSH-Benutzer (z.B. root oder deploy)
#   DEPLOY_SSH_KEY   – privater SSH-Key (ed25519 empfohlen)
#   DEPLOY_APP_DIR   – Pfad auf dem Server (Standard: /opt/tesla-carview)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-secrets:
    name: Secrets vorhanden?
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$HOST" ] && [ -n "$KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy via SSH
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/tesla-carview}"
            cd "$APP_DIR"
            sudo git fetch origin main
            sudo git reset --hard origin/main
            GIT_HASH=$(sudo git rev-parse --short HEAD)
            GIT_BRANCH=$(sudo git rev-parse --abbrev-ref HEAD)
            BUILD_DATE=$(sudo git log -1 --format=%ci)
            GIT_HASH="$GIT_HASH" GIT_BRANCH="$GIT_BRANCH" BUILD_DATE="$BUILD_DATE" \
              sudo docker compose -f docker-compose.prod.yml up -d --build backend frontend
            sudo docker system prune -f
            echo "Deployment erfolgreich: $(date) | $GIT_HASH"
