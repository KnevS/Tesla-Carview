name: Deploy

on:
  # Triggers only after CI has successfully built and pushed the images.
  # This guarantees the GHCR images exist before we pull them on the server.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Secrets (in GitHub Repository Settings → Secrets):
#   DEPLOY_HOST      – IP oder Hostname des Zielservers
#   DEPLOY_USER      – SSH-Benutzer (z.B. root oder deploy)
#   DEPLOY_SSH_KEY   – privater SSH-Key (ed25519 empfohlen)
#   DEPLOY_APP_DIR   – Pfad auf dem Server (Standard: /opt/tesla-carview)

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-secrets:
    name: Secrets vorhanden?
    runs-on: ubuntu-latest
    # For workflow_run: only deploy when CI succeeded. For manual dispatch: always.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$HOST" ] && [ -n "$KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy via SSH
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          command_timeout: 30m
          script: |
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/tesla-carview}"
            cd "$APP_DIR"
            sudo git fetch origin main
            sudo git reset --hard origin/main
            PRIVATE_REPO="/opt/tc-private.git"
            if [ -d "$PRIVATE_REPO" ]; then
              sudo git --git-dir="$PRIVATE_REPO" --work-tree="$APP_DIR" checkout -f HEAD -- .
              sudo git update-index --skip-worktree \
                backend/src/routes/demo.js \
                backend/src/services/demoLifecycle.js \
                frontend/src/views/Demo.vue
            fi
            # Backend- und Frontend-Bundle kommen direkt aus den GHCR-Images.
            # Frueher wurde das Frontend hier server-seitig gebaut und per
            # frontend-dist-private/-Volume eingehaengt — dieser Mount ist
            # entfernt (s. #84), das Image-Bundle wird direkt serviert.
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            # Deploy-Sequenz: pull → stop → rm → up
            #
            # Frueher: ein einziges `up -d --pull always backend frontend` —
            # das schaeftert intermittierend mit
            #   "Container Error when allocating new name: Conflict …"
            #   "cannot remove container …: container is running: stop the
            #    container before removing or force remove"
            # weil docker compose den alten Container nicht zuverlaessig
            # stoppt bevor der neue denselben Namen beansprucht. Der zurueck-
            # bleibende Container bekommt einen Random-Prefix und der Deploy
            # meldet trotzdem "success".
            #
            # Robuste Sequenz: erst pullen (kein Downtime), dann gestoppter
            # Container sauber entfernen (kein Name-Conflict), dann hoch-
            # ziehen. Downtime ~10-15s; akzeptabel fuer ein Deployment.
            echo "==> Neue Images aus GHCR ziehen …"
            sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml pull backend frontend

            echo "==> Container stoppen (sauberer Shutdown vor Recreate) …"
            sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml stop backend frontend || true

            echo "==> Container entfernen (vermeidet Name-Konflikt beim Up) …"
            sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml rm -f backend frontend || true

            # Falls ein vorheriger Deploy einen Random-Prefix-Container hinter-
            # lassen hat (selten, aber moeglich vor diesem Fix), raeumen wir
            # ihn jetzt mit auf damit der saubere Name wieder frei ist.
            for name in tesla-carview-backend tesla-carview-frontend; do
              for c in $(sudo docker ps -aq --filter "name=_${name}\$"); do
                echo "==> Verwaister Random-Prefix-Container: $c"
                sudo docker rm -f "$c" || true
              done
            done

            echo "==> Container hochziehen …"
            sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml up -d backend frontend

            # Ollama (gebundelter lokaler LLM-Runtime, ab v3.5.0). Idempotent:
            # wenn schon up → no-op, sonst starten.
            #
            # Wichtig: explizites Service-Argument bei `compose up` overridet
            # die Profile-Filter (Docker-Compose-Quirk). Damit das per
            # `services.ollama.profiles: [disabled]` Override tatsaechlich
            # respektiert wird (siehe README — Hosts mit < 4 GB RAM), pruefen
            # wir zuerst ob ollama im disabled-Profile steckt.
            #
            # `compose --profile disabled config --services` listet die
            # Services die im disabled-Profile sind. Erscheint ollama dort,
            # ist der Service per Override abgeschaltet — skip.
            if sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml \
                 --profile disabled config --services 2>/dev/null | grep -q '^ollama$'; then
              echo "==> Ollama per disabled-Profile abgeschaltet — skip"
            else
              echo "==> Ollama sicherstellen (idempotent) …"
              sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml up -d ollama || \
                echo "Ollama-Service nicht gestartet — OK"
            fi

            sudo docker logout ghcr.io
            # Sicherstellen dass nginx in beiden erforderlichen Netzwerken läuft.
            COMPOSE_NET="tesla-carview_tesla-net"
            if ! sudo docker inspect tesla-carview-nginx \
                --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
                2>/dev/null | grep -q "$COMPOSE_NET"; then
              echo "==> nginx nicht in $COMPOSE_NET — network connect"
              sudo docker network connect "$COMPOSE_NET" tesla-carview-nginx
            fi
            if ! sudo docker inspect tesla-carview-nginx \
                --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
                2>/dev/null | grep -q "traefik-proxy"; then
              echo "==> nginx nicht in traefik-proxy — network connect"
              sudo docker network connect traefik-proxy tesla-carview-nginx
            fi
            sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml \
              restart nginx

            # Post-Deploy-Healthcheck (Lehre aus dem 502 vom 2026-06-21):
            # Der Host-nginx-Edge proxyt teslaview.krische.com → 127.0.0.1:8080
            # (Port-Mapping des nginx-Containers). Wenn das Mapping fehlt oder
            # das Backend nicht hochkommt, antwortet :8080 nicht — der Deploy
            # soll dann ROT werden statt still "success" zu melden.
            echo "==> Healthcheck: http://localhost:8080/api/health …"
            HEALTH_OK=""
            for i in $(seq 1 12); do
              sleep 3
              if wget -q -O /dev/null -T 5 "http://localhost:8080/api/health"; then
                HEALTH_OK="yes"; echo "Healthcheck OK nach ~$((i*3))s"; break
              fi
              echo "Versuch $i/12: Backend über :8080 noch nicht bereit …"
            done
            if [ -z "$HEALTH_OK" ]; then
              echo "FEHLER: Backend antwortet nach dem Deploy nicht auf http://localhost:8080/api/health (Down/502)."
              echo "Letzte Backend-Logs:"; sudo docker logs --tail 30 tesla-carview-backend 2>&1 || true
              echo "nginx-Port-Mapping:"; sudo docker ps --filter name=tesla-carview-nginx --format '{{.Ports}}' || true
              exit 1
            fi

            sudo docker image prune -f
            GIT_HASH=$(sudo git rev-parse --short HEAD)
            echo "Deployment erfolgreich + Healthcheck OK: $(date) | $GIT_HASH"
