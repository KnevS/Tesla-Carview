name: Deploy

on:
  # Triggers only after CI has successfully built and pushed the images.
  # This guarantees the GHCR images exist before we pull them on the server.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Secrets (in GitHub Repository Settings → Secrets):
#   DEPLOY_HOST      – IP oder Hostname des Zielservers
#   DEPLOY_USER      – SSH-Benutzer (z.B. root oder deploy)
#   DEPLOY_SSH_KEY   – privater SSH-Key (ed25519 empfohlen)
#   DEPLOY_APP_DIR   – Pfad auf dem Server (Standard: /opt/tesla-carview)

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-secrets:
    name: Secrets vorhanden?
    runs-on: ubuntu-latest
    # For workflow_run: only deploy when CI succeeded. For manual dispatch: always.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$HOST" ] && [ -n "$KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy via SSH
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          command_timeout: 20m
          script: |
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/tesla-carview}"
            cd "$APP_DIR"
            sudo git fetch origin main
            sudo git reset --hard origin/main
            PRIVATE_REPO="/opt/tc-private.git"
            if [ -d "$PRIVATE_REPO" ]; then
              sudo git --git-dir="$PRIVATE_REPO" --work-tree="$APP_DIR" checkout -f HEAD -- .
              sudo git update-index --skip-worktree \
                backend/src/routes/demo.js \
                backend/src/services/demoLifecycle.js \
                frontend/src/views/Demo.vue
            fi
            # Frontend lokal bauen wenn sich der Git-Stand seit dem letzten Bundle geändert hat.
            # Gespeicherter Hash in frontend-dist-private/.build-hash verhindert unnötige Rebuilds.
            CURRENT_HASH=$(sudo git -C "$APP_DIR" rev-parse HEAD 2>/dev/null || echo unknown)
            BUILD_HASH=$(cat "$APP_DIR/frontend-dist-private/.build-hash" 2>/dev/null || echo "")
            if [ "$CURRENT_HASH" != "$BUILD_HASH" ] || [ ! -f "$APP_DIR/frontend-dist-private/index.html" ]; then
              echo "==> Privates Frontend-Bundle bauen (Hash: ${CURRENT_HASH:0:7}) …"
              GIT_HASH=$(sudo git -C "$APP_DIR" rev-parse --short HEAD 2>/dev/null || echo unknown)
              sudo docker build \
                --build-arg GIT_HASH="$GIT_HASH" \
                -t tesla-carview-frontend-private:local \
                "$APP_DIR/frontend" 2>&1 | tail -8
              sudo docker create --name tmp-frontend-extract tesla-carview-frontend-private:local
              # Alte Dateien via Docker löschen (sudo rm -rf würde Passwort brauchen)
              sudo docker run --rm \
                -v "$APP_DIR/frontend-dist-private:/dist" \
                alpine sh -c 'rm -rf /dist/* /dist/.[!.]*'
              # Neues Bundle kopieren
              sudo docker cp tmp-frontend-extract:/usr/share/nginx/html/. "$APP_DIR/frontend-dist-private/"
              sudo docker rm tmp-frontend-extract
              sudo docker image rm tesla-carview-frontend-private:local 2>/dev/null || true
              # Build-Hash speichern damit nächster Deploy den Rebuild überspringen kann
              echo "$CURRENT_HASH" | sudo docker run --rm -i \
                -v "$APP_DIR/frontend-dist-private:/dist" \
                alpine sh -c 'cat > /dist/.build-hash'
              sudo docker exec tesla-carview-frontend nginx -s reload 2>/dev/null || true
              echo "==> Privates Frontend-Bundle bereit."
            else
              echo "==> Frontend-Bundle aktuell (Hash: ${CURRENT_HASH:0:7}) — kein Rebuild nötig."
            fi
            # Pull pre-built images from GHCR (no local build needed)
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml pull backend frontend
            sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml up -d backend frontend
            sudo docker logout ghcr.io
            # Sicherstellen dass nginx in beiden erforderlichen Netzwerken läuft.
            COMPOSE_NET="tesla-carview_tesla-net"
            if ! sudo docker inspect tesla-carview-nginx \
                --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
                2>/dev/null | grep -q "$COMPOSE_NET"; then
              echo "==> nginx nicht in $COMPOSE_NET — network connect"
              sudo docker network connect "$COMPOSE_NET" tesla-carview-nginx
            fi
            if ! sudo docker inspect tesla-carview-nginx \
                --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
                2>/dev/null | grep -q "traefik-proxy"; then
              echo "==> nginx nicht in traefik-proxy — network connect"
              sudo docker network connect traefik-proxy tesla-carview-nginx
            fi
            sudo docker compose -f /opt/tesla-carview/docker-compose.prod.yml \
              restart nginx
            sudo docker image prune -f
            GIT_HASH=$(sudo git rev-parse --short HEAD)
            echo "Deployment erfolgreich: $(date) | $GIT_HASH"
