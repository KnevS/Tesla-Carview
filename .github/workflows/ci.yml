name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Bundle-Budget: Haupt-Chunk darf nicht größer als diese Werte sein.
  # Bei Überschreitung → Fehler im CI, PR kann nicht gemergt werden.
  BUNDLE_WARN_KB: 800      # Warnung ab hier
  BUNDLE_FAIL_KB: 1500     # Fehler ab hier (regressiver Bloat)

jobs:
  # ─── Backend: Syntax + Security ──────────────────────────────────────────
  backend:
    name: Backend – lint & security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      # ESLint mit no-undef (+ ein paar Bug-Regeln) faengt undefinierte
      # Bezeichner ab: fehlende/auskommentierte Imports, Tippfehler in
      # Variablennamen, fehlende Funktionsargumente. Diese Bugs kompilieren
      # sauber durch und crashen sonst erst zur Laufzeit.
      - name: Lint (ESLint)
        run: npm run lint

      # npm audit blockiert bei high/critical — moderate ist akzeptabel
      # (transitive Deps, die wir nicht direkt kontrollieren).
      - name: Security Audit (npm audit)
        run: npm audit --audit-level=high
        continue-on-error: false   # Fehler blockiert den Merge

  # ─── Frontend: Build + Security + Bundle-Größe ───────────────────────────
  frontend:
    name: Frontend – build & bundle-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci

      # Security Audit Frontend
      - name: Security Audit (npm audit)
        run: npm audit --audit-level=high
        continue-on-error: false

      # ESLint mit no-undef faengt undefinierte Bezeichner in JS + Vue-SFCs
      # ab (fehlende Imports, Tippfehler) — der vite build sieht diese nicht.
      - name: Lint (ESLint)
        run: npm run lint

      - name: Build
        run: npm run build

      # Bundle-Größen-Analyse: Haupt-Chunk ausmessen und mit Budget vergleichen.
      # Der Wert wird als Job-Summary angezeigt und bei Überschreitung als Fehler markiert.
      - name: Bundle-Größen-Check
        shell: bash
        run: |
          MAIN_CHUNK=$(ls dist/assets/index-*.js 2>/dev/null | head -1 || ls dist/assets/index.js 2>/dev/null || echo "")
          if [[ -z "$MAIN_CHUNK" ]]; then
            echo "⚠ Kein Haupt-Chunk gefunden — Bundle-Check übersprungen"
            exit 0
          fi
          SIZE_BYTES=$(stat -c%s "$MAIN_CHUNK" 2>/dev/null || stat -f%z "$MAIN_CHUNK")
          SIZE_KB=$((SIZE_BYTES / 1024))
          GZIP_KB=$(gzip -c "$MAIN_CHUNK" | wc -c | awk '{printf "%.0f", $1/1024}')

          # GitHub Actions Step Summary
          {
            echo "## 📦 Bundle-Größe"
            echo "| Chunk | Größe | Gzip |"
            echo "|-------|-------|------|"
            echo "| \`$(basename $MAIN_CHUNK)\` | **${SIZE_KB} KB** | ~${GZIP_KB} KB |"

            # Alle Chunks auflisten
            echo ""
            echo "### Alle Chunks"
            echo "\`\`\`"
            ls -lh dist/assets/*.js 2>/dev/null | awk '{print $5, $9}' | sort -k1 -rh | head -20
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Haupt-Bundle: ${SIZE_KB} KB (gzip: ~${GZIP_KB} KB)"

          if [[ "$SIZE_KB" -ge "$BUNDLE_FAIL_KB" ]]; then
            echo "::error::Bundle zu groß: ${SIZE_KB} KB >= ${BUNDLE_FAIL_KB} KB Limit! Code-Splitting prüfen."
            exit 1
          elif [[ "$SIZE_KB" -ge "$BUNDLE_WARN_KB" ]]; then
            echo "::warning::Bundle nähert sich dem Budget: ${SIZE_KB} KB (Limit: ${BUNDLE_FAIL_KB} KB)"
          else
            echo "✓ Bundle im Budget (${SIZE_KB} KB / ${BUNDLE_FAIL_KB} KB)"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Docker: Backend ─────────────────────────────────────────────────────
  build-backend:
    name: Docker – build & push backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # arm/v7 (32-Bit ARM) ist ausgeschlossen: better-sqlite3 / argon2
      # kompilieren native Binaries via node-gyp, was unter QEMU arm/v7
      # konsistent mit SIGILL (exit 132) fehlschlaegt.
      # arm64: seit better-sqlite3@12 + argon2@0.44 treten SIGILL-Crashes
      # auch unter QEMU arm64 intermittierend auf (exit 132). Ursache:
      # node-gyp generiert ARM-Code mit neueren CPU-Extensions die QEMU
      # nicht vollstaendig emuliert. Wechsel auf node:22-alpine verbessert
      # die Verfuegbarkeit von Prebuilt-Binaries und reduziert JIT-Crashes.
      - name: Build & push backend (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/knevs/tesla-carview/backend:main
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ─── Docker: Frontend ────────────────────────────────────────────────────
  build-frontend:
    name: Docker – build & push frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push frontend (amd64 + arm64 + arm/v7)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ghcr.io/knevs/tesla-carview/frontend:main
          build-args: |
            GIT_HASH=${{ github.sha }}
