version: 2

# Dependabot überwacht beide npm-Arbeitsbereiche, GitHub Actions und
# die Docker-Basisimages. Automatisch geöffnete PRs werden durch CI
# geprüft (ci.yml: lint+audit+bundle, security.yml: npm audit +
# trivy fs + semgrep + SBOM, gitleaks.yml).
#
# Sicherheits-Updates öffnet Dependabot per Default sofort
# (unabhängig vom Schedule der regulären Updates).
#
# Auto-Merge für minor+patch erfolgt über
# `.github/workflows/dependabot-auto-merge.yml` — sobald alle CI-Gates
# grün sind, mergt der Workflow den PR via `gh pr merge --auto`.
# Major-Bumps bleiben manuell.

updates:
  # ─── Frontend-Dependencies ─────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(devdeps)"
    # Nur patch + minor automatisch — major-Updates als PR zur manuellen Prüfung
    groups:
      patch-updates:
        update-types:
          - minor
          - patch

  # ─── Backend-Dependencies ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
    groups:
      patch-updates:
        update-types:
          - minor
          - patch
    # Major-Bumps fuer Express (4 -> 5 hat Breaking Changes: req.param weg,
    # app.del weg, strengere Path-Matching-Regex, Async-Handler-Semantik
    # geaendert). Sicher erst mit dediziertem Test-Sprint upgraden.
    ignore:
      - dependency-name: express
        update-types:
          - version-update:semver-major

  # ─── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps)"
    groups:
      action-updates:
        update-types:
          - minor
          - patch

  # ─── Docker-Basisimages: Backend ───────────────────────────────────────
  # Wachsam gegen veraltete node:22-alpine-Tags und CVEs in Basisimages,
  # die `trivy fs` nicht im npm-Lockfile findet.
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  # ─── Docker-Basisimages: Frontend ──────────────────────────────────────
  # Frontend nutzt zwei Stages: node:20-bookworm-slim (builder) und
  # nginx:alpine (runtime). Beide werden ueberwacht.
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"
