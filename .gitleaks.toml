# Gitleaks-Config für Tesla Carview.
#
# Erweitert die Default-Regeln (AWS, GitHub-Tokens, JWT, etc.) um
# projekt-spezifische Patterns:
#   - Echte VINs (17 Stellen, ohne All-Zero-Endung als Platzhalter)
#   - Operator-Identität (operator / @example.com)
#   - Tesla OAuth / Refresh-Tokens
#   - Echte Lat/Lon-Paare in JSON/JS-Dateien außerhalb von Tests
#
# Aufruf:  gitleaks detect --config .gitleaks.toml --redact
# CI:      siehe .github/workflows/gitleaks.yml

[extend]
useDefault = true

# ─── Custom Rules ──────────────────────────────────────────────────────

[[rules]]
id          = "tesla-vin-real"
description = "Tesla VIN (17 Zeichen, 5YJ/7SA Prefix)"
# 5YJ = Model S/X/3/Y, 7SA = Cybertruck. Doku-Platzhalter
# (5YJ3E1EA1NF000000 etc.) sind in der [allowlist] eingetragen.
# Go's RE2-Engine kennt keine Lookahead-Patterns — deshalb hier ein
# simples 17-Zeichen-Match und Filterung ueber die Allowlist.
regex       = '''\b(?:5YJ|7SA)[A-HJ-NPR-Z0-9]{14}\b'''
tags        = ["personal-data", "tesla"]

[[rules]]
id          = "operator-email"
description = "Echte Operator-E-Mail (the operator)"
regex       = '''(?i)(operator@example\.com)'''
tags        = ["personal-data", "operator-identity"]

[[rules]]
id          = "tesla-oauth-token"
description = "Tesla Fleet-API Access/Refresh-Token-Pattern"
# Tesla OAuth-Access-Tokens beginnen mit „eyJ" (JWT) und sind sehr lang.
# Default-Rule erkennt generische JWTs — diese Regel verschärft das auf
# typische Tesla-Längen (>500 Zeichen Base64).
regex       = '''eyJ[A-Za-z0-9_-]{30,}\.[A-Za-z0-9_-]{50,}\.[A-Za-z0-9_-]{20,}'''
tags        = ["secret", "tesla"]

[[rules]]
id          = "google-maps-api-key"
description = "Google Maps API-Key (AIza-Prefix)"
regex       = '''AIza[0-9A-Za-z\-_]{35}'''
tags        = ["secret", "google"]

[[rules]]
id          = "real-lat-lon-pair"
description = "Konkretes Lat/Lon-Paar (>= 6 Nachkommastellen) — möglicherweise GPS-Spur"
# Sechs Nachkommastellen ≈ 11 cm Genauigkeit, das ist real-GPS, nicht
# Demo-Daten. Demo-Seeder rundet auf 4 Nachkommastellen ab.
regex       = '''\b(?:4[5-9]|5[0-4])\.\d{6,}\s*,\s*(?:[6-9]|1[0-5])\.\d{6,}\b'''
tags        = ["personal-data", "location"]

# ─── Allowlist ─────────────────────────────────────────────────────────
# Bekannte Stellen im Repo, die regex-mäßig Treffer geben würden, aber
# inhaltlich harmlos sind (Platzhalter in Docs, Test-Fixtures).

[allowlist]
description = "Doku-Platzhalter und Beispiel-Daten"
paths = [
  '''.*\.example$''',
  '''docs/.*''',
  '''README\.md''',
  '''NOTICE\.md''',
  '''AUTHORS\.md''',
  # CLAUDE.md ist Meta-Doku ueber genau diese Regeln; sie zaehlt die
  # verbotenen Patterns auf und wuerde sonst auf jede dieser Regeln
  # selbst anschlagen.
  '''CLAUDE\.md''',
  '''frontend/src/handbook/.*''',
  # gitleaks-Selbstreferenz
  '''\.gitleaks\.toml$''',
]
regexes = [
  # Doku-Platzhalter-VINs: alles, was auf sechs Nullen endet
  # (Konvention: echte VINs haben dort die Seriennummer).
  '''5YJ[A-HJ-NPR-Z0-9]{8}0{6}''',
  '''7SA[A-HJ-NPR-Z0-9]{8}0{6}''',
  # Operator-Adresse in README/NOTICE/AUTHORS ist gewollte Attribution
  '''Sven Krische''',
]
