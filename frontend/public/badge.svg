<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!--
    Monochromes Badge-Icon für Web-Push.
    Apple Watch / iOS-Sperrbildschirm rendert dieses Icon klein und einfarbig
    (weiße Silhouette auf transparent). Daher: keine Farbverläufe, keine
    Innen-Details — nur die Außenform des Fahrzeugs. Detailliertes Icon-192
    bleibt das App-Logo für Push-Inhalt.
  -->
  <path d="
    M 8,72
    C 6,68 7,60 12,52
    L 18,48
    L 28,42
    L 38,34
    C 42,30 48,28 54,28
    L 70,28
    C 78,28 86,32 92,42
    L 94,52
    L 94,64
    L 88,72
    L 82,73
    C 78,66 70,62 62,62
    C 54,62 46,66 42,73
    L 28,73
    C 26,66 18,62 10,62
    Z
  " fill="white"/>
  <!-- Räder als gefüllte Kreise (Silhouette only) -->
  <circle cx="20" cy="74" r="11" fill="white"/>
  <circle cx="72" cy="74" r="11" fill="white"/>
</svg>
