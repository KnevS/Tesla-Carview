<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tesla Carview</title>

    <!-- PWA + Mobile-Install — funktioniert auf Smartphones (iOS/Android),
         Desktop-Browsern und im Tesla-Fahrzeug-Browser. Add-to-Home-Screen
         auf iOS nutzt apple-touch-icon (PNG, 180x180); Android und
         Tesla/Chromium nutzen das Manifest.
         theme-color faerbt die Statusleiste und das Tesla-Browser-Frame. -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Carview" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Nevs-Edition Typographie: Bricolage Grotesque (Display-Headlines),
         Manrope (Body), JetBrains Mono (Labels/Code). Nur aktiv wenn
         data-design="editorial" gesetzt.
         SELBST GEHOSTET (SIL OFL 1.1) unter /fonts/ — KEINE Requests an Google
         (Privacy: keine User-IPs an Dritte). Details: public/fonts/fonts.css. -->
    <link rel="stylesheet" href="/fonts/fonts.css">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
