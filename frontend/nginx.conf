server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Assets (Vite Content-Hash): langlebig & immutable cachen.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # HTML, Service Worker und Manifest: NIE cachen, sonst hängt der
    # Browser nach Deploys auf alten Bundle-Hashes fest.
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
