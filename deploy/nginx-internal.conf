# Docker-interner DNS-Resolver: löst Hostnamen bei jeder Anfrage neu auf.
# Das verhindert den 502-Fehler nach Container-Neustarts, weil nginx die
# IP nicht beim Start cached sondern dynamisch nachschlägt (TTL 10s).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;

    # Variablen erzwingen dynamische DNS-Auflösung statt statischem Cache.
    set $backend_upstream  http://backend:3000;
    set $frontend_upstream http://frontend:80;

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /.well-known/appspecific/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /fleet_telemetry {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
    }
}
