# Diese Datei kommt auf den Host-Server nach:
# /etc/nginx/sites-available/tesla-carview
# Dann: ln -s /etc/nginx/sites-available/tesla-carview /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name tesla.iland.krische.com;

    # Nach 'certbot --nginx' wird dieser Block automatisch auf HTTPS umgeleitet
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
