# /etc/nginx/sites-available/tesla-carview
# Symlink: ln -s /etc/nginx/sites-available/tesla-carview /etc/nginx/sites-enabled/
#
# Voraussetzung: certbot --nginx -d tesla.iland.krische.com
# Danach SSL-Block von certbot automatisch ergaenzt.

# Rate-Limiting Zonen (in nginx.conf http{}-Block oder hier)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=120r/m;

# HTTP -> HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name tesla.iland.krische.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tesla.iland.krische.com;

    # --- TLS-Zertifikate (von certbot automatisch gesetzt) ---
    ssl_certificate     /etc/letsencrypt/live/tesla.iland.krische.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tesla.iland.krische.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/tesla.iland.krische.com/chain.pem;

    # --- TLS-Protokolle und Cipher-Suites ---
    # Nur TLS 1.2 und 1.3 (1.0 und 1.1 sind unsicher)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Bevorzugte Cipher-Suites fuer Forward Secrecy
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off; # TLS 1.3 waehlt selbst optimal

    # --- Session-Handling ---
    # Session-Tickets deaktiviert: verhindert Wiederverwendung von Session-Schlüsseln
    # (Perfect Forward Secrecy bleibt auch bei kompromittiertem Server erhalten)
    ssl_session_tickets off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- OCSP-Stapling (spart dem Browser eine CA-Anfrage) ---
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 9.9.9.9 149.112.112.112 valid=300s; # Quad9 DNS
    resolver_timeout 5s;

    # --- Security-Header ---
    # HSTS: Browser merkt sich HTTPS fuer 2 Jahre, inkl. Subdomains
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Kein Framing (Clickjacking-Schutz)
    add_header X-Frame-Options "DENY" always;

    # Verhindert MIME-Type-Sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer nur an gleiche Origin senden
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Kamera, Mikrofon, Geolocation nur mit expliziter Zustimmung
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;

    # Content-Security-Policy: erlaubt nur eigene Ressourcen + OSM-Kacheln
    add_header Content-Security-Policy
      "default-src 'self'; \
       script-src 'self'; \
       style-src 'self' 'unsafe-inline'; \
       img-src 'self' data: https://*.tile.openstreetmap.org; \
       connect-src 'self'; \
       font-src 'self'; \
       object-src 'none'; \
       frame-src 'none'; \
       base-uri 'self'; \
       form-action 'self'; \
       upgrade-insecure-requests;" always;

    # --- Logging ---
    access_log /var/log/nginx/tesla-carview.access.log;
    error_log  /var/log/nginx/tesla-carview.error.log  warn;

    # --- Login-Endpoint: strenges Rate-Limiting ---
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- API ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # --- Frontend (SPA) ---
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
